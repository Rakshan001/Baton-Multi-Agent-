# Configures GitHub's "Generate release notes" button to group PRs by label.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
    authors:
      - dependabot
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - fix
        - bug
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🔒 Security
      labels:
        - security
    - title: 🧰 Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: 🔎 Other Changes
      labels:
        - "*"
