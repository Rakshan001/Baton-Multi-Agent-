name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `baton serve`, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps so we can reproduce it.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Baton version / commit
      description: Output of `baton --version`, or the commit SHA.
      placeholder: 0.0.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version` (Baton requires ≥ 20).
      placeholder: v20.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant terminal output or errors. This is automatically formatted.
      render: shell
