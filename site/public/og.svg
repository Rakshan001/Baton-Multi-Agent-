<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Baton — Plan on your expensive agent. Pass the baton to your cheap one.">
  <defs>
    <linearGradient id="baton" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9d2e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff9d2e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="930" cy="300" r="280" fill="url(#bloom)"/>

  <!-- relay nodes + traveling baton -->
  <path d="M760,180 C880,150 950,220 980,300 C1010,380 940,440 840,440" fill="none" stroke="#ff9d2e" stroke-width="2" stroke-dasharray="4 10" stroke-opacity="0.5"/>
  <circle cx="760" cy="180" r="26" fill="#121214" stroke="#ffffff26"/>
  <circle cx="760" cy="180" r="7" fill="#ff9d2e"/>
  <circle cx="980" cy="300" r="26" fill="#121214" stroke="#ff9d2e" stroke-width="2"/>
  <circle cx="980" cy="300" r="7" fill="#ff9d2e"/>
  <circle cx="840" cy="440" r="26" fill="#121214" stroke="#ffffff26"/>
  <circle cx="840" cy="440" r="7" fill="#ff9d2e"/>
  <g transform="translate(905,240) rotate(35)">
    <rect x="-22" y="-7" width="44" height="14" rx="7" fill="url(#baton)"/>
  </g>

  <!-- wordmark + headline -->
  <text x="80" y="150" font-family="monospace" font-size="30" fill="#ff9d2e">/baton</text>
  <text x="80" y="290" font-family="sans-serif" font-size="62" font-weight="700" fill="#f4f4f5" letter-spacing="-2">Plan on your</text>
  <text x="80" y="362" font-family="sans-serif" font-size="62" font-weight="700" fill="#ff9d2e" letter-spacing="-2">expensive agent.</text>
  <text x="80" y="448" font-family="sans-serif" font-size="44" font-weight="600" fill="#a1a1aa" letter-spacing="-1">Pass the baton to your cheap one.</text>
  <text x="80" y="540" font-family="monospace" font-size="22" fill="#71717a">Coordinate AI coding agents on one repo · open source</text>
</svg>
